<div class="spinner-wrapper" *ngIf="loading">
  <mat-spinner diameter="50"></mat-spinner>
</div>

<ng-container *ngIf="!loading">

  <div class="kpi-grid" *ngIf="invoices.length > 0; else emptyState">
    <mat-card *ngFor="let stat of stats" class="kpi-card" [ngClass]="stat.cardClass">
      <h3 class="label">{{ stat.label }}</h3>
      <h2 *ngIf="stat.type === 'currency'">{{ stat.value | currency:'INR':'symbol':'1.0-0' }}</h2>
      <h2 *ngIf="stat.type === 'count'">{{ stat.value }}</h2>
    </mat-card>
  </div>

  <ng-template #emptyState>
    <mat-card class="empty-state">
      <p>No invoices available yet. Dashboard state will update automatically when invoice data is added.</p>
    </mat-card>
  </ng-template>

</ng-container>
