<mat-card class="page-card mat-elevation-z4">
    <div class="page-header">
        <button mat-icon-button (click)="back()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h2>{{ isUpdate ? "Update Gst" : "Add New Gst" }}</h2>
    </div>
    <form [formGroup]="gstForm" class="form-grid">
        <!-- <mat-form-field class="id-field">
            <mat-label>User Id</mat-label>
            <mat-select placeholder="select userId" matInput formControlName="userId">
                <mat-option [value]="null">None</mat-option>
                <mat-option class="mat-option" *ngFor="let ids of userId" [value]="ids">{{ids}}</mat-option>
            </mat-select>
        </mat-form-field> -->
        <mat-form-field class="id-field">
            <mat-label>Gst Rate</mat-label>
            <input placeholder="Enter Gst Rate" matInput maxlength="2" formControlName="gst">
            <mat-hint># enter Gst Rate</mat-hint>
        </mat-form-field>
        <section class="check-wrapper">
            <label class="field-label" >Enable / Disable :</label>
            <div class="status-options">
                <mat-checkbox class="status-option" formControlName="isActive"></mat-checkbox>
            </div>
        </section>
    </form>
    <div class="btn-row">
        <button mat-flat-button (click)="saveGst()">Save</button>
        <button mat-stroked-button (click)="cancel()">Cancel</button>
    </div>
</mat-card>
