<div class="gst-list-container">
    <div class="top-bar">
        <mat-form-field appearance="outline">
            <mat-label>Search GST</mat-label>
            <input matInput type="text" (keyup)="applyFilter($event)" placeholder="Search by rate" />
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button mat-fab extended color="primary" (click)="addGst()">
            <mat-icon>add</mat-icon> <b>Add GST</b>
        </button>
    </div>
    <mat-card>
        <div class="table-wrapper">
            <table mat-table [dataSource]="dataSource" matSort>
                <ng-container matColumnDef="no">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>no</th>
                    <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
                </ng-container>
                <!-- <ng-container matColumnDef="userId">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>User ID</th>
                    <td mat-cell *matCellDef="let row">{{ row.userId }}</td>
                </ng-container> -->
                <ng-container matColumnDef="Gst">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Rates</th>
                    <td mat-cell *matCellDef="let row">{{ row.gst/100 | percent: '1.2-2' }}</td>
                </ng-container>
                <ng-container matColumnDef="isActive">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>
                        Active status
                    </th>
                    <td mat-cell *matCellDef="let row">
                        {{ row.isActive | booleanText }}
                    </td>
                </ng-container>
                <ng-container matColumnDef="createdAt">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Created Date</th>
                    <td mat-cell *matCellDef="let row">
                        {{ row.createdAt | date }}
                    </td>
                </ng-container>
                <ng-container matColumnDef="updatedAt">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Updated Date</th>
                    <td mat-cell *matCellDef="let row">
                        {{ row.updatedAt && row.updatedAt !== '0001-01-01T00:00:00'
                        ? (row.updatedAt | date)
                        : '-' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let row">
                        <button mat-icon-button color="primary" matTooltip="edit GST" [disabled]="!canAddGst()"
                            (click)="editGst(row)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" matTooltip="delete GST" [disabled]="!canAddGst()"
                            (click)="deleteGst(row)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayColumns"></tr>

                <tr class="mat-row no-data-row" *matNoDataRow>
                    <td class="mat-cell" [attr.colspan]="displayColumns.length">No data</td>
                </tr>
            </table>
        </div>
    </mat-card>
    <mat-paginator [pageSizeOptions]="[5, 10, 15]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>
</div>
