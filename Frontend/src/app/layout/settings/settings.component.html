<mat-card class="page-card mat-elevation-z4">

    <div class="page-header">
        <button mat-icon-button (click)="back()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h2 class="title">Settings</h2>
    </div>

    <form class="example-form">

        <mat-accordion class="example-headers-align" multi>
            <mat-expansion-panel>
                <mat-expansion-panel-header>
                    <mat-panel-title><b>Product Settings</b></mat-panel-title>
                    <mat-panel-description> Manage Product Access
                        <mat-icon>account_circle</mat-icon>
                    </mat-panel-description>

                </mat-expansion-panel-header>
                <p> <mat-slide-toggle labelPosition="before" (change)="accessToggle($event.checked)" [checked]="checked" >Enable product
                        Edit</mat-slide-toggle></p>
            </mat-expansion-panel>

        </mat-accordion>

    </form>
    <div class="btn-row">
        <button mat-flat-button>Save</button>
        <button mat-stroked-button>Cancel</button>
    </div>
</mat-card>
