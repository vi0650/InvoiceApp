<mat-card class="page-card mat-elevation-z4">
    <div class="page-header">
        <button mat-icon-button (click)="back()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h2>{{ isUpdate ? "Update Product" : "Add New Product" }}</h2>
    </div>
    <form [formGroup]="productForm" class="form-grid">
        <mat-form-field>
            <mat-label>Product Name</mat-label>
            <input matInput placeholder="Enter Product Name" formControlName="productName">
            <mat-error
                *ngIf="productForm.get('productName')?.hasError('required') && productForm.get('productName')?.touched">
                Enter Product Name
            </mat-error>
        </mat-form-field>
        <!-- <mat-form-field class="id-field">
            <mat-label>User Id</mat-label>
            <mat-select placeholder="select userId" matInput formControlName="userId">
                <mat-option [value]="null">None</mat-option>
                <mat-option class="mat-option" *ngFor="let ids of userId" [value]="ids">{{ids}}</mat-option>
            </mat-select>
        </mat-form-field> -->
        <mat-form-field class="id-field">
            <mat-label>Rate</mat-label>
            <input placeholder="Enter Product Rate" #rate matInput maxlength="any" formControlName="rate">
            <mat-hint># enter Rate under given length</mat-hint>
            <mat-hint align="end">{{rate.value.length}} / 10</mat-hint>
        </mat-form-field>
        <section class="check-wrapper">
            <label class="field-label">Active :</label>
            <div class="status-options">
                <mat-checkbox class="status-option" formControlName="isActive"></mat-checkbox>
            </div>
        </section>
    </form>
    <div class="btn-row">
        <button mat-flat-button (click)="saveProduct()">Save</button>
        <button mat-stroked-button (click)="cancel()">Cancel</button>
    </div>
</mat-card>
